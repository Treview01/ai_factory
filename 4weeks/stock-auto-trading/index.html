<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 자동매매 시뮬레이터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f2f2f7 0%, #e5e5ea 100%);
      min-height: 100vh;
    }
    .ios-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .price-chart {
      background: linear-gradient(180deg, rgba(0,122,255,0.08) 0%, rgba(0,122,255,0) 100%);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // KOSPI 주요 종목 (모의 데이터 시드용)
    const STOCKS = [
      { code: "005930", name: "삼성전자", base: 75000, vol: 0.018 },
      { code: "000660", name: "SK하이닉스", base: 195000, vol: 0.028 },
      { code: "035420", name: "NAVER", base: 215000, vol: 0.022 },
      { code: "035720", name: "카카오", base: 48000, vol: 0.030 },
      { code: "005380", name: "현대차", base: 245000, vol: 0.020 },
      { code: "051910", name: "LG화학", base: 380000, vol: 0.025 },
      { code: "207940", name: "삼성바이오로직스", base: 850000, vol: 0.024 },
      { code: "068270", name: "셀트리온", base: 175000, vol: 0.028 },
    ];

    // 시드 기반 의사난수 (재현성 있게)
    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // 일봉 가격 시계열 생성 (랜덤 워크 + 약한 추세)
    function generatePrices(stock, days, seed) {
      const rand = mulberry32(seed + parseInt(stock.code));
      const drift = (rand() - 0.45) * 0.0008;
      const prices = [];
      let price = stock.base;
      const today = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        const noise = (rand() - 0.5) * 2 * stock.vol;
        price = Math.max(price * (1 + drift + noise), stock.base * 0.3);
        prices.push({
          date: date.toISOString().slice(0, 10),
          close: Math.round(price),
        });
      }
      return prices;
    }

    // 이동평균 계산
    function sma(values, period) {
      const result = [];
      for (let i = 0; i < values.length; i++) {
        if (i < period - 1) { result.push(null); continue; }
        let sum = 0;
        for (let j = i - period + 1; j <= i; j++) sum += values[j];
        result.push(sum / period);
      }
      return result;
    }

    // 백테스트: 이동평균 교차 전략
    function backtest(prices, shortP, longP, initialCash, feeRate) {
      const closes = prices.map(p => p.close);
      const sShort = sma(closes, shortP);
      const sLong = sma(closes, longP);
      let cash = initialCash;
      let shares = 0;
      const trades = [];
      const equity = [];
      for (let i = 0; i < prices.length; i++) {
        const price = closes[i];
        // 골든크로스: 매수
        if (i > 0 && sShort[i] != null && sLong[i] != null) {
          const prevDiff = sShort[i-1] - sLong[i-1];
          const currDiff = sShort[i] - sLong[i];
          if (prevDiff <= 0 && currDiff > 0 && cash > price) {
            const buyShares = Math.floor(cash / (price * (1 + feeRate)));
            if (buyShares > 0) {
              const cost = buyShares * price * (1 + feeRate);
              cash -= cost;
              shares += buyShares;
              trades.push({ date: prices[i].date, type: "BUY", price, shares: buyShares, cash });
            }
          } else if (prevDiff >= 0 && currDiff < 0 && shares > 0) {
            const proceeds = shares * price * (1 - feeRate);
            cash += proceeds;
            trades.push({ date: prices[i].date, type: "SELL", price, shares, cash });
            shares = 0;
          }
        }
        equity.push({ date: prices[i].date, value: cash + shares * price });
      }
      const finalValue = cash + shares * closes[closes.length - 1];
      return {
        trades,
        equity,
        sShort,
        sLong,
        finalValue,
        returnPct: ((finalValue - initialCash) / initialCash) * 100,
        finalCash: cash,
        finalShares: shares,
      };
    }

    function fmtKRW(n) {
      return new Intl.NumberFormat("ko-KR").format(Math.round(n));
    }

    function PriceChart({ prices, sShort, sLong, trades }) {
      const w = 720, h = 260, pad = 30;
      if (!prices.length) return null;
      const closes = prices.map(p => p.close);
      const min = Math.min(...closes) * 0.98;
      const max = Math.max(...closes) * 1.02;
      const xAt = i => pad + (i / (prices.length - 1)) * (w - pad * 2);
      const yAt = v => h - pad - ((v - min) / (max - min)) * (h - pad * 2);
      const path = closes.map((c, i) => `${i === 0 ? "M" : "L"} ${xAt(i)} ${yAt(c)}`).join(" ");
      const areaPath = `${path} L ${xAt(prices.length - 1)} ${h - pad} L ${xAt(0)} ${h - pad} Z`;
      const linePath = (arr) => arr
        .map((v, i) => v == null ? null : `${xAt(i)},${yAt(v)}`)
        .filter(Boolean)
        .join(" ");
      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full">
          <path d={areaPath} fill="rgba(0,122,255,0.12)" />
          <path d={path} stroke="#007AFF" strokeWidth="2" fill="none" />
          {sShort && (
            <polyline points={linePath(sShort)} stroke="#FF9500" strokeWidth="1.5" fill="none" strokeDasharray="0" />
          )}
          {sLong && (
            <polyline points={linePath(sLong)} stroke="#AF52DE" strokeWidth="1.5" fill="none" />
          )}
          {trades && trades.map((t, idx) => {
            const i = prices.findIndex(p => p.date === t.date);
            if (i < 0) return null;
            return (
              <circle
                key={idx}
                cx={xAt(i)}
                cy={yAt(t.price)}
                r="5"
                fill={t.type === "BUY" ? "#34C759" : "#FF3B30"}
                stroke="white"
                strokeWidth="2"
              />
            );
          })}
        </svg>
      );
    }

    function App() {
      const [stockCode, setStockCode] = useState(STOCKS[0].code);
      const [days, setDays] = useState(180);
      const [shortP, setShortP] = useState(5);
      const [longP, setLongP] = useState(20);
      const [initialCash, setInitialCash] = useState(10000000);
      const [feePct, setFeePct] = useState(0.015);
      const [seed, setSeed] = useState(42);

      const stock = STOCKS.find(s => s.code === stockCode);
      const prices = useMemo(() => generatePrices(stock, days, seed), [stock, days, seed]);
      const result = useMemo(
        () => backtest(prices, shortP, longP, initialCash, feePct / 100),
        [prices, shortP, longP, initialCash, feePct]
      );

      const last = prices[prices.length - 1]?.close ?? 0;
      const first = prices[0]?.close ?? 1;
      const buyHoldPct = ((last - first) / first) * 100;

      return (
        <div className="max-w-5xl mx-auto p-4 sm:p-6">
          <header className="mb-6">
            <h1 className="text-3xl sm:text-4xl font-bold text-gray-900">주식 자동매매 시뮬레이터</h1>
            <p className="text-gray-500 mt-1 text-sm">이동평균 교차 전략 · 모의 백테스트 (실거래 아님)</p>
          </header>

          {/* 컨트롤 */}
          <div className="ios-card rounded-2xl p-5 shadow-sm mb-5">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <div>
                <label className="text-xs text-gray-500">종목</label>
                <select
                  value={stockCode}
                  onChange={e => setStockCode(e.target.value)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200 text-gray-900"
                >
                  {STOCKS.map(s => (
                    <option key={s.code} value={s.code}>{s.name} ({s.code})</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500">기간 (일)</label>
                <input type="number" min="30" max="730" value={days}
                  onChange={e => setDays(parseInt(e.target.value) || 180)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
              <div>
                <label className="text-xs text-gray-500">시드 (가격 패턴)</label>
                <input type="number" value={seed}
                  onChange={e => setSeed(parseInt(e.target.value) || 0)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
              <div>
                <label className="text-xs text-gray-500">단기 이동평균</label>
                <input type="number" min="2" max="60" value={shortP}
                  onChange={e => setShortP(parseInt(e.target.value) || 5)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
              <div>
                <label className="text-xs text-gray-500">장기 이동평균</label>
                <input type="number" min="5" max="200" value={longP}
                  onChange={e => setLongP(parseInt(e.target.value) || 20)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
              <div>
                <label className="text-xs text-gray-500">시작 자금 (원)</label>
                <input type="number" min="100000" step="100000" value={initialCash}
                  onChange={e => setInitialCash(parseInt(e.target.value) || 1000000)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
              <div>
                <label className="text-xs text-gray-500">거래 수수료 (%)</label>
                <input type="number" step="0.001" value={feePct}
                  onChange={e => setFeePct(parseFloat(e.target.value) || 0)}
                  className="w-full mt-1 px-3 py-2 rounded-lg bg-white/70 border border-gray-200" />
              </div>
            </div>
          </div>

          {/* 요약 */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
            <div className="ios-card rounded-2xl p-4 shadow-sm">
              <div className="text-xs text-gray-500">현재가</div>
              <div className="text-xl font-bold mt-1">{fmtKRW(last)}원</div>
            </div>
            <div className="ios-card rounded-2xl p-4 shadow-sm">
              <div className="text-xs text-gray-500">평가금액</div>
              <div className="text-xl font-bold mt-1">{fmtKRW(result.finalValue)}원</div>
            </div>
            <div className="ios-card rounded-2xl p-4 shadow-sm">
              <div className="text-xs text-gray-500">전략 수익률</div>
              <div className={`text-xl font-bold mt-1 ${result.returnPct >= 0 ? "text-red-500" : "text-blue-500"}`}>
                {result.returnPct >= 0 ? "+" : ""}{result.returnPct.toFixed(2)}%
              </div>
            </div>
            <div className="ios-card rounded-2xl p-4 shadow-sm">
              <div className="text-xs text-gray-500">단순 보유 수익률</div>
              <div className={`text-xl font-bold mt-1 ${buyHoldPct >= 0 ? "text-red-500" : "text-blue-500"}`}>
                {buyHoldPct >= 0 ? "+" : ""}{buyHoldPct.toFixed(2)}%
              </div>
            </div>
          </div>

          {/* 차트 */}
          <div className="ios-card rounded-2xl p-5 shadow-sm mb-5">
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-semibold text-gray-900">{stock.name} 가격 & 이동평균</h2>
              <div className="flex gap-3 text-xs">
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-blue-500"></span>종가</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-orange-500"></span>{shortP}일</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-purple-500"></span>{longP}일</span>
                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span>매수</span>
                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span>매도</span>
              </div>
            </div>
            <PriceChart
              prices={prices}
              sShort={result.sShort}
              sLong={result.sLong}
              trades={result.trades}
            />
          </div>

          {/* 거래 내역 */}
          <div className="ios-card rounded-2xl p-5 shadow-sm">
            <h2 className="font-semibold text-gray-900 mb-3">거래 내역 ({result.trades.length}건)</h2>
            {result.trades.length === 0 ? (
              <p className="text-gray-400 text-sm py-6 text-center">교차 신호가 발생하지 않았어요. 이동평균 기간을 조정해 보세요.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-gray-400 text-xs">
                      <th className="text-left py-2">날짜</th>
                      <th className="text-left py-2">구분</th>
                      <th className="text-right py-2">단가</th>
                      <th className="text-right py-2">수량</th>
                      <th className="text-right py-2">잔고</th>
                    </tr>
                  </thead>
                  <tbody>
                    {result.trades.map((t, i) => (
                      <tr key={i} className="border-t border-gray-100">
                        <td className="py-2 text-gray-700">{t.date}</td>
                        <td className="py-2">
                          <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                            t.type === "BUY" ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"
                          }`}>{t.type === "BUY" ? "매수" : "매도"}</span>
                        </td>
                        <td className="py-2 text-right text-gray-900">{fmtKRW(t.price)}원</td>
                        <td className="py-2 text-right text-gray-900">{fmtKRW(t.shares)}주</td>
                        <td className="py-2 text-right text-gray-500">{fmtKRW(t.cash)}원</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          <p className="text-center text-xs text-gray-400 mt-6">
            ⚠️ 이 시뮬레이터는 학습/실험용 모의 데이터를 사용합니다. 실제 매매에 사용하지 마세요.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T리뷰 · 심리 상담 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #eff6ff 50%, #f0fdfa 100%);
      min-height: 100vh;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.35s ease-out; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .typing-dot { animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-full transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-gradient-to-r from-rose-400 to-pink-500 text-white shadow-md hover:shadow-lg',
        secondary: 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50',
        ghost: 'text-gray-600 hover:bg-gray-100',
        soft: 'bg-rose-50 text-rose-600 hover:bg-rose-100',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-xs',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
        icon: 'w-10 h-10 text-base',
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    function Avatar({ emoji, bg = 'bg-gradient-to-br from-rose-300 to-pink-400', size = 'md' }) {
      const sizes = { sm: 'w-8 h-8 text-base', md: 'w-10 h-10 text-xl', lg: 'w-12 h-12 text-2xl' };
      return (
        <div className={`${sizes[size]} ${bg} rounded-full flex items-center justify-center shadow-sm flex-shrink-0`}>
          <span>{emoji}</span>
        </div>
      );
    }

    function Badge({ children, color = 'rose' }) {
      const colors = {
        rose: 'bg-rose-50 text-rose-600 border-rose-100',
        blue: 'bg-blue-50 text-blue-600 border-blue-100',
        green: 'bg-emerald-50 text-emerald-600 border-emerald-100',
        amber: 'bg-amber-50 text-amber-600 border-amber-100',
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${colors[color]}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 🧩 Chat Components
    // ========================================

    function Header({ counselor }) {
      return (
        <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
          <div className="flex items-center gap-3">
            <button className="md:hidden w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="뒤로가기">
              <svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
              </svg>
            </button>
            <div className="relative">
              <Avatar emoji={counselor.emoji} bg={counselor.bg} size="md" />
              <span className="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 border-2 border-white rounded-full"></span>
            </div>
            <div>
              <h1 className="font-semibold text-gray-900 text-sm">{counselor.name}</h1>
              <p className="text-xs text-emerald-500 flex items-center gap-1">
                <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full"></span>
                지금 대화 가능
              </p>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="음성 통화">
              <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </button>
            <button className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="더보기">
              <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 5v.01M12 12v.01M12 19v.01" />
              </svg>
            </button>
          </div>
        </header>
      );
    }

    function MessageBubble({ message, counselor }) {
      const isUser = message.role === 'user';
      return (
        <div className={`flex items-end gap-2 animate-fade-in-up ${isUser ? 'flex-row-reverse' : ''}`}>
          {!isUser && <Avatar emoji={counselor.emoji} bg={counselor.bg} size="sm" />}
          <div className={`flex flex-col max-w-[78%] ${isUser ? 'items-end' : 'items-start'}`}>
            <div
              className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap shadow-sm ${
                isUser
                  ? 'bg-gradient-to-br from-rose-400 to-pink-500 text-white rounded-br-md'
                  : 'bg-white text-gray-800 rounded-bl-md border border-gray-100'
              }`}
            >
              {message.text}
            </div>
            <span className="text-[10px] text-gray-400 mt-1 px-1">{message.time}</span>
          </div>
        </div>
      );
    }

    function TypingIndicator({ counselor }) {
      return (
        <div className="flex items-end gap-2 animate-fade-in-up">
          <Avatar emoji={counselor.emoji} bg={counselor.bg} size="sm" />
          <div className="bg-white px-4 py-3 rounded-2xl rounded-bl-md border border-gray-100 shadow-sm">
            <div className="flex items-center gap-1">
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
            </div>
          </div>
        </div>
      );
    }

    function DateDivider({ label }) {
      return (
        <div className="flex items-center gap-3 my-2">
          <div className="flex-1 h-px bg-gray-200"></div>
          <span className="text-xs text-gray-400 font-medium">{label}</span>
          <div className="flex-1 h-px bg-gray-200"></div>
        </div>
      );
    }

    function QuickReplies({ suggestions, onPick }) {
      return (
        <div className="flex flex-wrap gap-2 pb-2">
          {suggestions.map((s, i) => (
            <button
              key={i}
              onClick={() => onPick(s)}
              className="px-3 py-1.5 bg-white border border-rose-200 text-rose-600 text-xs rounded-full hover:bg-rose-50 transition-all active:scale-95 shadow-sm"
            >
              {s}
            </button>
          ))}
        </div>
      );
    }

    function MoodPicker({ mood, onChange }) {
      const moods = [
        { key: 'sad', emoji: '😔', label: '우울해요' },
        { key: 'anxious', emoji: '😰', label: '불안해요' },
        { key: 'angry', emoji: '😣', label: '화나요' },
        { key: 'tired', emoji: '😮‍💨', label: '지쳤어요' },
        { key: 'okay', emoji: '🙂', label: '괜찮아요' },
      ];
      return (
        <div className="bg-white/70 backdrop-blur rounded-2xl p-3 border border-gray-100">
          <p className="text-xs text-gray-500 mb-2 px-1">오늘 기분이 어떠세요?</p>
          <div className="flex gap-2 overflow-x-auto scrollbar-thin">
            {moods.map((m) => (
              <button
                key={m.key}
                onClick={() => onChange(m.key)}
                className={`flex flex-col items-center justify-center min-w-[64px] py-2 px-1 rounded-xl transition-all ${
                  mood === m.key
                    ? 'bg-gradient-to-br from-rose-100 to-pink-100 border-2 border-rose-300 scale-105'
                    : 'bg-white border-2 border-gray-100 hover:border-rose-200'
                }`}
              >
                <span className="text-2xl">{m.emoji}</span>
                <span className="text-[10px] text-gray-600 mt-1">{m.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function InputBar({ value, onChange, onSend, disabled }) {
      const textareaRef = useRef(null);

      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 120) + 'px';
        }
      }, [value]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (value.trim()) onSend();
        }
      };

      return (
        <div className="bg-white/80 backdrop-blur-md border-t border-gray-100 px-3 py-3 sticky bottom-0">
          <div className="flex items-end gap-2">
            <button className="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500" aria-label="첨부">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
              </svg>
            </button>
            <div className="flex-1 bg-gray-50 rounded-3xl px-4 py-2 flex items-end gap-2 border border-gray-100">
              <textarea
                ref={textareaRef}
                rows="1"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="마음에 담아둔 이야기를 들려주세요..."
                className="flex-1 bg-transparent outline-none resize-none text-sm text-gray-800 placeholder-gray-400 leading-relaxed py-1.5"
                style={{ maxHeight: '120px' }}
              />
              <button className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-500" aria-label="이모지">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </button>
            </div>
            <button
              onClick={onSend}
              disabled={disabled || !value.trim()}
              className={`w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full transition-all active:scale-95 ${
                value.trim() && !disabled
                  ? 'bg-gradient-to-br from-rose-400 to-pink-500 text-white shadow-md hover:shadow-lg'
                  : 'bg-gray-100 text-gray-300'
              }`}
              aria-label="보내기"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 19V5M5 12l7-7 7 7" />
              </svg>
            </button>
          </div>
          <p className="text-[10px] text-gray-400 text-center mt-2">
            이 대화는 전문 의료 상담을 대체하지 않습니다.
          </p>
        </div>
      );
    }

    // ========================================
    // 📄 Chat Page
    // ========================================

    function ChatPage() {
      const counselor = {
        name: '마음 상담사 T리뷰',
        emoji: '🌸',
        bg: 'bg-gradient-to-br from-rose-300 to-pink-400',
      };

      const [messages, setMessages] = useState([
        {
          id: 1,
          role: 'bot',
          text: '안녕하세요. 저는 마음 상담사 T리뷰예요 🌸\n오늘 여기까지 찾아와주셔서 고맙습니다.',
          time: '오후 2:30',
        },
        {
          id: 2,
          role: 'bot',
          text: '편하게 이야기 나눠봐요.\n어떤 마음으로 오셨나요?',
          time: '오후 2:30',
        },
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [mood, setMood] = useState(null);
      const scrollRef = useRef(null);

      const suggestions = useMemo(
        () => ['요즘 잠이 잘 안 와요', '이유 없이 불안해요', '관계가 힘들어요', '그냥 이야기하고 싶어요'],
        []
      );

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, isTyping]);

      const formatTime = () => {
        const now = new Date();
        return `${now.getHours() < 12 ? '오전' : '오후'} ${((now.getHours() + 11) % 12) + 1}:${String(now.getMinutes()).padStart(2, '0')}`;
      };

      const sendMessage = async (text) => {
        const time = formatTime();
        const userMsg = { id: Date.now(), role: 'user', text, time };

        // Build API payload from full history (including the new user turn)
        // UI roles: 'user' | 'bot'  →  API roles: 'user' | 'assistant'
        const history = [...messages, userMsg].map((m) => ({
          role: m.role === 'bot' ? 'assistant' : 'user',
          content: m.text,
        }));

        setMessages((prev) => [...prev, userMsg]);
        setInput('');
        setIsTyping(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history }),
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!data.reply) throw new Error('빈 응답');

          const botMsg = {
            id: Date.now() + 1,
            role: 'bot',
            text: data.reply,
            time: formatTime(),
          };
          setMessages((prev) => [...prev, botMsg]);
        } catch (err) {
          console.error('[chat] error:', err);
          const errMsg = {
            id: Date.now() + 1,
            role: 'bot',
            text: '음... 잠깐 연결이 흔들렸어요. 조금만 있다가 다시 말씀해 주실래요? 🌿',
            time: formatTime(),
          };
          setMessages((prev) => [...prev, errMsg]);
        } finally {
          setIsTyping(false);
        }
      };

      const handleSend = () => {
        if (input.trim()) sendMessage(input.trim());
      };

      return (
        <div className="max-w-md mx-auto h-screen flex flex-col bg-white/40 backdrop-blur-sm shadow-xl md:my-0 md:rounded-none md:h-screen relative">
          <Header counselor={counselor} />

          <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-3 scrollbar-thin">
            <DateDivider label="오늘" />

            <div className="flex justify-center">
              <Badge color="rose">안전한 대화 공간</Badge>
            </div>

            <MoodPicker mood={mood} onChange={setMood} />

            {messages.map((m) => (
              <MessageBubble key={m.id} message={m} counselor={counselor} />
            ))}

            {isTyping && <TypingIndicator counselor={counselor} />}

            {messages.length <= 2 && !isTyping && (
              <div className="pt-2">
                <p className="text-xs text-gray-400 mb-2 px-1">이렇게 시작해 볼까요</p>
                <QuickReplies suggestions={suggestions} onPick={sendMessage} />
              </div>
            )}
          </div>

          <InputBar value={input} onChange={setInput} onSend={handleSend} disabled={isTyping} />
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      return <ChatPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

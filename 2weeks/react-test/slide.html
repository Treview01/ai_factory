<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML & CSS 슬라이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-60px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes typeIn {
      from { opacity: 0; transform: translateY(10px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
      50% { box-shadow: 0 0 40px rgba(99,102,241,0.6); }
    }
    .anim-up { animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-scale { animation: fadeInScale 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-left { animation: slideInLeft 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-right { animation: slideInRight 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-type { animation: typeIn 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.2s; } .d3 { animation-delay: 0.3s; }
    .d4 { animation-delay: 0.4s; } .d5 { animation-delay: 0.5s; } .d6 { animation-delay: 0.6s; }
    .d7 { animation-delay: 0.7s; } .d8 { animation-delay: 0.8s; } .d9 { animation-delay: 0.9s; }
    .d10 { animation-delay: 1.0s; } .d11 { animation-delay: 1.1s; } .d12 { animation-delay: 1.2s; }

    .gradient-text {
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .glass-light {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .code-glass {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function CodeSnippet({ code, className = "" }) {
      return (
        <pre className={`code-glass rounded-2xl p-5 mono text-sm leading-relaxed overflow-x-auto ${className}`}>
          <code dangerouslySetInnerHTML={{ __html: code }} />
        </pre>
      );
    }

    function TagPill({ name, color = "indigo" }) {
      const colors = {
        indigo: "from-indigo-500/20 to-purple-500/20 text-indigo-300 border-indigo-500/30",
        blue: "from-blue-500/20 to-cyan-500/20 text-blue-300 border-blue-500/30",
        green: "from-green-500/20 to-emerald-500/20 text-green-300 border-green-500/30",
        orange: "from-orange-500/20 to-amber-500/20 text-orange-300 border-orange-500/30",
        pink: "from-pink-500/20 to-rose-500/20 text-pink-300 border-pink-500/30",
        purple: "from-purple-500/20 to-fuchsia-500/20 text-purple-300 border-purple-500/30",
      };
      return (
        <span className={`mono text-xs px-3 py-1.5 rounded-full bg-gradient-to-r border ${colors[color]}`}>
          &lt;{name}&gt;
        </span>
      );
    }

    // ========================================
    // 📄 Slide Definitions
    // ========================================

    function CoverSlide() {
      return (
        <div className="flex flex-col items-center justify-center h-full text-center px-8">
          <div className="anim-scale">
            <div className="w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl mb-8 mx-auto shadow-2xl shadow-indigo-500/30">
              &lt;/&gt;
            </div>
          </div>
          <h1 className="text-7xl font-black tracking-tight anim-up d1">
            <span className="gradient-text">HTML & CSS</span>
          </h1>
          <p className="text-2xl text-white/50 font-light mt-4 anim-up d2">태그와 스타일 완벽 가이드</p>
          <div className="flex gap-3 mt-10 anim-up d3">
            <span className="glass-light text-white/40 text-sm px-4 py-2 rounded-full">← → 키로 이동</span>
            <span className="glass-light text-white/40 text-sm px-4 py-2 rounded-full">ESC 목차</span>
          </div>
        </div>
      );
    }

    function HeadingSlide() {
      const headings = [
        { tag: "h1", size: "text-5xl", label: "페이지 제목", weight: "font-black" },
        { tag: "h2", size: "text-4xl", label: "섹션 제목", weight: "font-bold" },
        { tag: "h3", size: "text-3xl", label: "하위 섹션", weight: "font-semibold" },
        { tag: "h4", size: "text-2xl", label: "소제목", weight: "font-semibold" },
        { tag: "h5", size: "text-xl", label: "작은 제목", weight: "font-medium" },
        { tag: "h6", size: "text-lg", label: "가장 작은 제목", weight: "font-medium" },
      ];
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-indigo-400 text-sm mb-3 anim-type">01 / 제목 태그</p>
          <h2 className="text-5xl font-bold text-white mb-12 anim-up d1">제목 태그 <span className="text-white/30">h1 ~ h6</span></h2>
          <div className="space-y-4">
            {headings.map((h, i) => (
              <div key={h.tag} className={`flex items-center gap-6 anim-left d${i + 2}`}>
                <span className="mono text-indigo-400 text-sm w-10 shrink-0">{h.tag}</span>
                <div className="h-px bg-white/10 w-8 shrink-0" />
                <span className={`${h.size} ${h.weight} text-white`}>{h.label}</span>
                <span className="text-white/20 text-sm ml-auto">{h.label}</span>
              </div>
            ))}
          </div>
          <div className="mt-10 anim-up d9">
            <p className="text-white/30 text-sm">한 페이지에 <span className="text-indigo-400">h1은 하나만</span> 사용하는 것이 SEO에 유리합니다.</p>
          </div>
        </div>
      );
    }

    function TextSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-green-400 text-sm mb-3 anim-type">02 / 텍스트 태그</p>
          <h2 className="text-5xl font-bold text-white mb-12 anim-up d1">텍스트 <span className="text-white/30">서식 태그</span></h2>
          <div className="grid grid-cols-2 gap-4">
            {[
              { tag: "strong", demo: <strong className="text-red-400 font-bold">강하게 강조</strong>, desc: "중요한 텍스트" },
              { tag: "em", demo: <em className="text-purple-400 italic">기울임 강조</em>, desc: "의미적 강조" },
              { tag: "mark", demo: <mark className="bg-yellow-500/30 text-yellow-200 px-1 rounded">하이라이트</mark>, desc: "형광펜 표시" },
              { tag: "del / ins", demo: <span><del className="text-white/30">삭제</del> → <ins className="text-green-400 no-underline">추가</ins></span>, desc: "수정 표시" },
              { tag: "code", demo: <code className="mono bg-white/10 text-pink-400 px-2 py-0.5 rounded text-sm">console.log()</code>, desc: "인라인 코드" },
              { tag: "kbd", demo: <span><kbd className="bg-white/10 border border-white/20 rounded px-2 py-0.5 text-sm shadow">⌘</kbd> + <kbd className="bg-white/10 border border-white/20 rounded px-2 py-0.5 text-sm shadow">C</kbd></span>, desc: "키보드 입력" },
              { tag: "sub / sup", demo: <span className="text-white">H<sub className="text-cyan-400">2</sub>O &nbsp; E=mc<sup className="text-cyan-400">2</sup></span>, desc: "아래/위 첨자" },
              { tag: "abbr", demo: <abbr title="HyperText Markup Language" className="text-white underline decoration-dotted decoration-white/30 cursor-help">HTML</abbr>, desc: "약어 (hover)" },
            ].map((item, i) => (
              <div key={item.tag} className={`glass rounded-2xl p-5 flex items-center gap-4 anim-scale d${i + 2}`}>
                <div className="shrink-0 w-28">
                  <span className="mono text-xs text-white/40">&lt;{item.tag}&gt;</span>
                </div>
                <div className="text-lg">{item.demo}</div>
                <span className="text-white/20 text-xs ml-auto">{item.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function QuoteSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-purple-400 text-sm mb-3 anim-type">03 / 인용문 & 코드</p>
          <h2 className="text-5xl font-bold text-white mb-12 anim-up d1">인용문 & <span className="text-white/30">코드 블록</span></h2>
          <div className="grid grid-cols-1 gap-6">
            <div className="anim-left d2">
              <div className="flex items-center gap-2 mb-3"><TagPill name="blockquote" color="purple" /><span className="text-white/30 text-sm">인용문</span></div>
              <blockquote className="glass rounded-2xl p-8 border-l-4 border-purple-500">
                <p className="text-2xl text-white/80 font-light italic leading-relaxed">"좋은 코드는 그 자체로 최고의 문서이다."</p>
                <footer className="text-white/30 mt-4 text-sm">— Steve McConnell</footer>
              </blockquote>
            </div>
            <div className="grid grid-cols-2 gap-6">
              <div className="anim-left d4">
                <div className="flex items-center gap-2 mb-3"><TagPill name="pre" color="blue" /><TagPill name="code" color="blue" /></div>
                <CodeSnippet code={`<span style="color:#c792ea">function</span> <span style="color:#82aaff">greet</span><span style="color:#89ddff">(</span><span style="color:#f78c6c">name</span><span style="color:#89ddff">)</span> <span style="color:#89ddff">{</span>\n  <span style="color:#c792ea">return</span> <span style="color:#c3e88d">\`안녕하세요, \${name}님!\`</span><span style="color:#89ddff">;</span>\n<span style="color:#89ddff">}</span>`} />
              </div>
              <div className="anim-right d5">
                <div className="flex items-center gap-2 mb-3"><TagPill name="address" color="green" /></div>
                <div className="glass rounded-2xl p-6 border-l-4 border-green-500/50">
                  <p className="text-white/60 text-sm leading-relaxed">
                    작성자: 홍길동<br/>
                    이메일: hong@example.com<br/>
                    서울특별시 강남구
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ListSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-orange-400 text-sm mb-3 anim-type">04 / 목록 태그</p>
          <h2 className="text-5xl font-bold text-white mb-12 anim-up d1">목록 <span className="text-white/30">ul · ol · dl</span></h2>
          <div className="grid grid-cols-3 gap-6">
            <div className="anim-scale d2">
              <div className="flex items-center gap-2 mb-4"><TagPill name="ul" color="orange" /><span className="text-white/30 text-sm">순서 없는 목록</span></div>
              <div className="glass rounded-2xl p-6">
                <ul className="space-y-3">
                  {['사과', '바나나', '포도', '딸기'].map((item, i) => (
                    <li key={item} className="flex items-center gap-3 text-white/70">
                      <span className="w-2 h-2 rounded-full bg-orange-400 shrink-0" />
                      {item}
                    </li>
                  ))}
                </ul>
              </div>
            </div>
            <div className="anim-scale d4">
              <div className="flex items-center gap-2 mb-4"><TagPill name="ol" color="blue" /><span className="text-white/30 text-sm">순서 있는 목록</span></div>
              <div className="glass rounded-2xl p-6">
                <ol className="space-y-3">
                  {['HTML 배우기', 'CSS 익히기', 'JS 시작하기', 'React 도전'].map((item, i) => (
                    <li key={item} className="flex items-center gap-3 text-white/70">
                      <span className="w-7 h-7 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center text-sm font-semibold shrink-0">{i + 1}</span>
                      {item}
                    </li>
                  ))}
                </ol>
              </div>
            </div>
            <div className="anim-scale d6">
              <div className="flex items-center gap-2 mb-4"><TagPill name="dl" color="green" /><span className="text-white/30 text-sm">정의 목록</span></div>
              <div className="glass rounded-2xl p-6 space-y-4">
                {[
                  { term: "HTML", def: "마크업 언어" },
                  { term: "CSS", def: "스타일시트" },
                  { term: "JS", def: "프로그래밍 언어" },
                ].map(item => (
                  <div key={item.term}>
                    <dt className="text-green-400 font-semibold text-sm">{item.term}</dt>
                    <dd className="text-white/50 text-sm pl-4 border-l-2 border-white/10 mt-1">{item.def}</dd>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TableSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-cyan-400 text-sm mb-3 anim-type">05 / 표 태그</p>
          <h2 className="text-5xl font-bold text-white mb-12 anim-up d1">표 <span className="text-white/30">table</span></h2>
          <div className="anim-scale d2">
            <div className="glass rounded-2xl overflow-hidden">
              <table className="w-full">
                <thead>
                  <tr className="bg-white/5">
                    <th className="text-left px-6 py-4 text-xs uppercase tracking-wider text-white/40 font-semibold">태그</th>
                    <th className="text-left px-6 py-4 text-xs uppercase tracking-wider text-white/40 font-semibold">역할</th>
                    <th className="text-left px-6 py-4 text-xs uppercase tracking-wider text-white/40 font-semibold">설명</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { tag: "table", role: "컨테이너", desc: "표 전체를 감싸는 태그" },
                    { tag: "thead", role: "헤더 그룹", desc: "열 제목 행을 묶는 태그" },
                    { tag: "tbody", role: "본문 그룹", desc: "데이터 행들을 묶는 태그" },
                    { tag: "tfoot", role: "푸터 그룹", desc: "합계/요약 행을 묶는 태그" },
                    { tag: "tr", role: "행", desc: "하나의 가로 줄" },
                    { tag: "th", role: "헤더 셀", desc: "제목 셀 (기본 bold 정렬)" },
                    { tag: "td", role: "데이터 셀", desc: "일반 데이터 셀" },
                    { tag: "caption", role: "표 제목", desc: "표의 제목을 나타냄" },
                  ].map((row, i) => (
                    <tr key={row.tag} className={`border-t border-white/5 hover:bg-white/5 transition-colors anim-type d${i + 3}`}>
                      <td className="px-6 py-3.5"><span className="mono text-cyan-400 text-sm">&lt;{row.tag}&gt;</span></td>
                      <td className="px-6 py-3.5 text-white/70 text-sm">{row.role}</td>
                      <td className="px-6 py-3.5 text-white/40 text-sm">{row.desc}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div className="flex gap-3 mt-6 anim-up d10">
            <span className="mono text-xs text-white/20 glass-light px-3 py-1.5 rounded-full">colspan — 가로 병합</span>
            <span className="mono text-xs text-white/20 glass-light px-3 py-1.5 rounded-full">rowspan — 세로 병합</span>
            <span className="mono text-xs text-white/20 glass-light px-3 py-1.5 rounded-full">scope — 접근성 지정</span>
          </div>
        </div>
      );
    }

    function FormSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">
          <p className="mono text-pink-400 text-sm mb-3 anim-type">06 / 폼 태그</p>
          <h2 className="text-5xl font-bold text-white mb-10 anim-up d1">폼 <span className="text-white/30">form</span></h2>
          <div className="grid grid-cols-2 gap-6">
            <div className="space-y-4 anim-left d2">
              <div className="glass rounded-2xl p-6 space-y-4">
                <div>
                  <label className="text-white/40 text-xs block mb-1.5">text</label>
                  <div className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white/70 text-sm">이름을 입력하세요</div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-1.5">email</label>
                  <div className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white/70 text-sm">example@email.com</div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-1.5">password</label>
                  <div className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white/70 text-sm tracking-widest">••••••••</div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-1.5">textarea</label>
                  <div className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white/40 text-sm h-16">자기소개...</div>
                </div>
              </div>
            </div>
            <div className="space-y-4 anim-right d3">
              <div className="glass rounded-2xl p-6 space-y-5">
                <div>
                  <label className="text-white/40 text-xs block mb-2">select</label>
                  <div className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white/70 text-sm flex justify-between">
                    <span>서울</span><span className="text-white/20">▼</span>
                  </div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-2">radio</label>
                  <div className="flex gap-4">
                    {['남성', '여성', '기타'].map((g, i) => (
                      <span key={g} className="flex items-center gap-2 text-white/60 text-sm">
                        <span className={`w-4 h-4 rounded-full border-2 ${i === 0 ? 'border-pink-400 bg-pink-400/30' : 'border-white/20'}`} />
                        {g}
                      </span>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-2">checkbox</label>
                  <div className="flex gap-4">
                    {['독서', '운동', '음악'].map((h, i) => (
                      <span key={h} className="flex items-center gap-2 text-white/60 text-sm">
                        <span className={`w-4 h-4 rounded border-2 flex items-center justify-center text-xs ${i < 2 ? 'border-pink-400 bg-pink-400/20 text-pink-400' : 'border-white/20'}`}>{i < 2 ? '✓' : ''}</span>
                        {h}
                      </span>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="text-white/40 text-xs block mb-2">range</label>
                  <div className="relative h-2 bg-white/10 rounded-full overflow-hidden">
                    <div className="absolute left-0 top-0 h-full w-3/5 bg-gradient-to-r from-pink-500 to-purple-500 rounded-full" />
                  </div>
                </div>
                <div className="flex gap-3 pt-2">
                  <span className="bg-gradient-to-r from-pink-500 to-purple-500 text-white text-sm px-5 py-2.5 rounded-xl font-medium">제출</span>
                  <span className="glass-light text-white/50 text-sm px-5 py-2.5 rounded-xl">초기화</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MediaSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16 max-w-5xl mx-auto">

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const slides = [
        { id: 'cover', component: CoverSlide, title: '표지' },
        { id: 'heading', component: HeadingSlide, title: '제목 태그' },
        { id: 'text', component: TextSlide, title: '텍스트 태그' },
        { id: 'quote', component: QuoteSlide, title: '인용문 & 코드' },
        { id: 'list', component: ListSlide, title: '목록 태그' },
        { id: 'table', component: TableSlide, title: '표 태그' },
        { id: 'form', component: FormSlide, title: '폼 태그' },
        { id: 'media', component: MediaSlide, title: '미디어 태그' },
        { id: 'semantic', component: SemanticSlide, title: '시맨틱 태그' },
        { id: 'link', component: LinkSlide, title: '링크 태그' },
        { id: 'box', component: CSSBoxSlide, title: '박스 모델' },
        { id: 'layout', component: CSSLayoutSlide, title: 'Flexbox & Grid' },
        { id: 'props', component: CSSPropsSlide, title: 'CSS 속성' },
        { id: 'end', component: EndSlide, title: '마무리' },
      ];

      const [current, setCurrent] = useState(0);
      const [showTOC, setShowTOC] = useState(false);
      const [direction, setDirection] = useState(1);
      const [slideKey, setSlideKey] = useState(0);

      const goTo = useCallback((index) => {
        if (index < 0 || index >= slides.length) return;
        setDirection(index > current ? 1 : -1);
        setCurrent(index);
        setSlideKey(k => k + 1);
        setShowTOC(false);
      }, [current, slides.length]);

      const next = useCallback(() => goTo(current + 1), [goTo, current]);
      const prev = useCallback(() => goTo(current - 1), [goTo, current]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
          else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
          else if (e.key === 'Escape') { setShowTOC(s => !s); }
          else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
          else if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [next, prev, goTo, slides.length]);

      const SlideComponent = slides[current].component;
      const progress = ((current + 1) / slides.length) * 100;

      return (
        <div className="w-full h-full bg-black text-white relative overflow-hidden select-none">
          {/* Background gradient */}
          <div className="absolute inset-0 opacity-30"
            style={{ background: 'radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(168,85,247,0.1) 0%, transparent 60%)' }} />

          {/* Slide */}
          <div key={slideKey} className="relative w-full h-full z-10">
            <SlideComponent />
          </div>

          {/* Progress bar */}
          <div className="absolute bottom-0 left-0 right-0 h-1 bg-white/5 z-30">
            <div className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500 ease-out" style={{ width: `${progress}%` }} />
          </div>

          {/* Bottom bar */}
          <div className="absolute bottom-4 left-0 right-0 flex items-center justify-between px-8 z-30">
            <span className="mono text-xs text-white/20">{String(current + 1).padStart(2, '0')} / {String(slides.length).padStart(2, '0')}</span>
            <div className="flex gap-1.5">
              {slides.map((_, i) => (
                <button key={i} onClick={() => goTo(i)}
                  className={`w-1.5 h-1.5 rounded-full transition-all duration-300 ${i === current ? 'bg-white w-6' : 'bg-white/20 hover:bg-white/40'}`} />
              ))}
            </div>
            <button onClick={() => setShowTOC(s => !s)} className="mono text-xs text-white/20 hover:text-white/50 transition">
              ESC 목차
            </button>
          </div>

          {/* Navigation arrows */}
          {current > 0 && (
            <button onClick={prev}
              className="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full glass flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/10 transition z-30">
              ←
            </button>
          )}
          {current < slides.length - 1 && (
            <button onClick={next}
              className="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full glass flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/10 transition z-30">
              →
            </button>
          )}

          {/* TOC overlay */}
          {showTOC && (
            <div className="absolute inset-0 z-50 flex items-center justify-center" onClick={() => setShowTOC(false)}>
              <div className="absolute inset-0 bg-black/80 backdrop-blur-xl" />
              <div className="relative glass rounded-3xl p-8 max-w-lg w-full mx-4" onClick={e => e.stopPropagation()}>
                <h3 className="text-2xl font-bold mb-6">목차</h3>
                <div className="grid grid-cols-2 gap-2">
                  {slides.map((slide, i) => (
                    <button key={slide.id} onClick={() => goTo(i)}
                      className={`text-left px-4 py-3 rounded-xl text-sm transition ${
                        i === current
                          ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30'
                          : 'text-white/50 hover:bg-white/5 hover:text-white/80'
                      }`}>
                      <span className="mono text-xs text-white/20 mr-2">{String(i + 1).padStart(2, '0')}</span>
                      {slide.title}
                    </button>
                  ))}
                </div>
                <p className="text-white/20 text-xs text-center mt-6">ESC 또는 바깥 클릭으로 닫기</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 태그 & CSS 스타일 정리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .code-inline { font-family: 'Courier New', monospace; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function SectionCard({ title, children, color = "blue" }) {
      const colors = {
        blue: "border-blue-400 bg-blue-50",
        green: "border-green-400 bg-green-50",
        purple: "border-purple-400 bg-purple-50",
        orange: "border-orange-400 bg-orange-50",
        pink: "border-pink-400 bg-pink-50",
        teal: "border-teal-400 bg-teal-50",
      };
      return (
        <section className={`rounded-xl border-l-4 ${colors[color]} p-6 mb-6 shadow-sm`}>
          <h2 className="text-xl font-bold mb-4 text-gray-700">{title}</h2>
          {children}
        </section>
      );
    }

    function CodeBlock({ code }) {
      return (
        <pre className="bg-gray-900 text-green-300 text-sm rounded-lg p-4 overflow-x-auto my-3">
          <code>{code}</code>
        </pre>
      );
    }

    function Tag({ name }) {
      return (
        <span className="code-inline bg-gray-200 text-pink-600 text-sm px-2 py-0.5 rounded">
          &lt;{name}&gt;
        </span>
      );
    }

    // ========================================
    // 📄 Section: 제목 태그
    // ========================================

    function HeadingSection() {
      return (
        <SectionCard title="📝 제목 태그 (h1 ~ h6)" color="blue">
          <p className="text-sm text-gray-500 mb-3">문서의 제목 계층을 나타냅니다. h1이 가장 크고 h6이 가장 작습니다.</p>
          <div className="space-y-2 bg-white rounded-lg p-4">
            <h1 className="text-4xl font-bold">h1 — 가장 큰 제목</h1>
            <h2 className="text-3xl font-bold">h2 — 두 번째 제목</h2>
            <h3 className="text-2xl font-semibold">h3 — 세 번째 제목</h3>
            <h4 className="text-xl font-semibold">h4 — 네 번째 제목</h4>
            <h5 className="text-lg font-medium">h5 — 다섯 번째 제목</h5>
            <h6 className="text-base font-medium text-gray-500">h6 — 가장 작은 제목</h6>
          </div>
          <CodeBlock code={`<h1>h1 — 가장 큰 제목</h1>\n<h2>h2 — 두 번째 제목</h2>\n<h3>h3 — 세 번째 제목</h3>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 텍스트 태그
    // ========================================

    function TextSection() {
      return (
        <SectionCard title="✍️ 텍스트 관련 태그" color="green">
          <div className="bg-white rounded-lg p-4 space-y-3">
            <p>일반 텍스트 <Tag name="p" /></p>
            <p><strong className="text-red-600">강하게 강조 (strong)</strong></p>
            <p><em className="text-purple-600">기울임 강조 (em)</em></p>
            <p><b>굵은 텍스트 (b)</b> — 의미 없는 굵게</p>
            <p><i>이탤릭 텍스트 (i)</i> — 의미 없는 기울임</p>
            <p><u className="underline decoration-blue-400">밑줄 텍스트 (u)</u></p>
            <p><s className="text-gray-400">취소선 텍스트 (s)</s></p>
            <p><del className="text-gray-400">삭제된 텍스트 (del)</del> → <ins className="bg-green-100 px-1 rounded no-underline">추가된 텍스트 (ins)</ins></p>
            <p><mark className="bg-yellow-200 px-1 rounded">형광펜 표시 (mark)</mark></p>
            <p><small className="text-gray-400 text-sm">작은 텍스트 (small)</small></p>
            <p>H<sub>2</sub>O (sub) &nbsp; E=mc<sup>2</sup> (sup)</p>
            <p>인라인 코드: <code className="code-inline bg-gray-100 text-pink-500 px-2 py-0.5 rounded text-sm">console.log('hello')</code></p>
            <p>키보드: <kbd className="bg-gray-100 border border-gray-300 rounded px-2 py-0.5 text-sm shadow-sm">Ctrl</kbd> + <kbd className="bg-gray-100 border border-gray-300 rounded px-2 py-0.5 text-sm shadow-sm">C</kbd></p>
          </div>
          <CodeBlock code={`<strong>강하게 강조</strong>\n<em>기울임 강조</em>\n<mark>형광펜 표시</mark>\n<code>인라인 코드</code>\n<kbd>Ctrl</kbd> + <kbd>C</kbd>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 인용문 & 코드블록
    // ========================================

    function QuoteSection() {
      return (
        <SectionCard title="💬 인용문 & 코드 블록" color="purple">
          <div className="bg-white rounded-lg p-4 space-y-4">
            <blockquote className="border-l-4 border-blue-400 bg-blue-50 pl-4 py-3 rounded-r-lg italic text-gray-600">
              <p>"좋은 코드는 그 자체로 최고의 문서이다."</p>
              <footer className="text-sm text-gray-400 mt-1">— Steve McConnell</footer>
            </blockquote>

            <pre className="bg-gray-900 text-gray-200 p-4 rounded-lg text-sm overflow-x-auto">
{`function greet(name) {
    return '안녕하세요, ' + name + '님!';
}

console.log(greet('세계'));`}
            </pre>

            <address className="bg-gray-100 border-l-3 border-gray-400 p-3 rounded-lg text-sm not-italic">
              작성자: 홍길동<br />
              이메일: hong@example.com<br />
              서울특별시 강남구
            </address>
          </div>
          <CodeBlock code={`<blockquote>\n  <p>"인용문 내용"</p>\n  <footer>— 출처</footer>\n</blockquote>\n\n<pre><code>코드 블록</code></pre>\n\n<address>주소 정보</address>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 목록 태그
    // ========================================

    function ListSection() {
      return (
        <SectionCard title="📋 목록 태그" color="orange">
          <div className="bg-white rounded-lg p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <h3 className="font-semibold mb-2 text-gray-600">순서 없는 목록 (ul)</h3>
              <ul className="list-disc pl-5 space-y-1 text-gray-700">
                <li>사과</li>
                <li>바나나
                  <ul className="list-circle pl-5 mt-1 space-y-1">
                    <li>미니 바나나</li>
                    <li>몽키 바나나</li>
                  </ul>
                </li>
                <li>포도</li>
              </ul>
            </div>

            <div>
              <h3 className="font-semibold mb-2 text-gray-600">순서 있는 목록 (ol)</h3>
              <ol className="list-decimal pl-5 space-y-1 text-gray-700">
                <li>첫 번째 항목</li>
                <li>두 번째 항목</li>
                <li>세 번째 항목</li>
              </ol>
            </div>

            <div>
              <h3 className="font-semibold mb-2 text-gray-600">정의 목록 (dl)</h3>
              <dl className="space-y-2">
                <dt className="font-bold text-gray-700">HTML</dt>
                <dd className="text-gray-500 pl-3 border-l-2 border-gray-200">마크업 언어</dd>
                <dt className="font-bold text-gray-700">CSS</dt>
                <dd className="text-gray-500 pl-3 border-l-2 border-gray-200">스타일시트 언어</dd>
                <dt className="font-bold text-gray-700">JS</dt>
                <dd className="text-gray-500 pl-3 border-l-2 border-gray-200">프로그래밍 언어</dd>
              </dl>
            </div>
          </div>
          <CodeBlock code={`<ul>\n  <li>순서 없는 항목</li>\n</ul>\n\n<ol>\n  <li>순서 있는 항목</li>\n</ol>\n\n<dl>\n  <dt>용어</dt>\n  <dd>정의</dd>\n</dl>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 표 태그
    // ========================================

    function TableSection() {
      return (
        <SectionCard title="📊 표 태그 (table)" color="teal">
          <div className="bg-white rounded-lg p-4 overflow-x-auto">
            <table className="w-full border-collapse rounded-lg overflow-hidden shadow-sm">
              <caption className="text-left text-sm text-gray-500 font-semibold mb-2">학생 성적표</caption>
              <thead>
                <tr className="bg-blue-500 text-white">
                  <th className="px-4 py-3 text-left">이름</th>
                  <th className="px-4 py-3 text-left">국어</th>
                  <th className="px-4 py-3 text-left">수학</th>
                  <th className="px-4 py-3 text-left">평균</th>
                </tr>
              </thead>
              <tbody>
                <tr className="hover:bg-blue-50 transition-colors">
                  <td className="px-4 py-3 border-b border-gray-100">홍길동</td>
                  <td className="px-4 py-3 border-b border-gray-100">90</td>
                  <td className="px-4 py-3 border-b border-gray-100">85</td>
                  <td className="px-4 py-3 border-b border-gray-100">87.5</td>
                </tr>
                <tr className="bg-gray-50 hover:bg-blue-50 transition-colors">
                  <td className="px-4 py-3 border-b border-gray-100">김철수</td>
                  <td className="px-4 py-3 border-b border-gray-100">78</td>
                  <td className="px-4 py-3 border-b border-gray-100">92</td>
                  <td className="px-4 py-3 border-b border-gray-100">85.0</td>
                </tr>
                <tr className="hover:bg-blue-50 transition-colors">
                  <td className="px-4 py-3 border-b border-gray-100">이영희</td>
                  <td className="px-4 py-3 border-b border-gray-100">95</td>
                  <td className="px-4 py-3 border-b border-gray-100">88</td>
                  <td className="px-4 py-3 border-b border-gray-100">91.5</td>
                </tr>
              </tbody>
              <tfoot>
                <tr className="bg-gray-100 font-semibold">
                  <td className="px-4 py-3">전체 평균</td>
                  <td className="px-4 py-3" colSpan="3">88.0</td>
                </tr>
              </tfoot>
            </table>
          </div>
          <CodeBlock code={`<table>\n  <thead>\n    <tr><th>이름</th><th>점수</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>홍길동</td><td>90</td></tr>\n  </tbody>\n  <tfoot>\n    <tr><td colSpan="2">평균: 90</td></tr>\n  </tfoot>\n</table>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 폼 태그
    // ========================================

    function FormSection() {
      const [formData, setFormData] = useState({
        name: '', email: '', color: '#4285f4', range: 50, agree: false, city: '', gender: ''
      });

      const handleChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
      };

      return (
        <SectionCard title="📝 폼 태그 (form)" color="pink">
          <div className="bg-white rounded-lg p-4">
            <form onSubmit={e => e.preventDefault()} className="space-y-4">

              <fieldset className="border border-gray-200 rounded-lg p-4">
                <legend className="text-sm font-bold text-blue-500 px-2">텍스트 입력</legend>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">이름</label>
                    <input type="text" placeholder="이름을 입력하세요"
                      value={formData.name} onChange={e => handleChange('name', e.target.value)}
                      className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none transition" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">이메일</label>
                    <input type="email" placeholder="example@email.com"
                      value={formData.email} onChange={e => handleChange('email', e.target.value)}
                      className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none transition" />
                  </div>
                </div>
              </fieldset>

              <fieldset className="border border-gray-200 rounded-lg p-4">
                <legend className="text-sm font-bold text-blue-500 px-2">선택 입력</legend>
                <div className="space-y-3">
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">도시 선택 (select)</label>
                    <select value={formData.city} onChange={e => handleChange('city', e.target.value)}
                      className="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-300 outline-none">
                      <option value="">-- 선택 --</option>
                      <optgroup label="수도권">
                        <option value="seoul">서울</option>
                        <option value="incheon">인천</option>
                      </optgroup>
                      <optgroup label="광역시">
                        <option value="busan">부산</option>
                        <option value="daegu">대구</option>
                      </optgroup>
                    </select>
                  </div>

                  <div>
                    <span className="block text-sm font-medium text-gray-600 mb-1">성별 (radio)</span>
                    <div className="flex gap-4">
                      {['남성', '여성', '기타'].map(g => (
                        <label key={g} className="flex items-center gap-1 text-sm cursor-pointer">
                          <input type="radio" name="gender" value={g}
                            checked={formData.gender === g} onChange={e => handleChange('gender', e.target.value)}
                            className="accent-blue-500" /> {g}
                        </label>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="flex items-center gap-2 text-sm cursor-pointer">
                      <input type="checkbox" checked={formData.agree} onChange={e => handleChange('agree', e.target.checked)}
                        className="accent-blue-500 w-4 h-4" />
                      <span>이용약관에 동의합니다 (checkbox)</span>
                    </label>
                  </div>
                </div>
              </fieldset>

              <fieldset className="border border-gray-200 rounded-lg p-4">
                <legend className="text-sm font-bold text-blue-500 px-2">기타 입력</legend>
                <div className="space-y-3">
                  <div className="flex items-center gap-3">
                    <label className="text-sm font-medium text-gray-600">색상:</label>
                    <input type="color" value={formData.color} onChange={e => handleChange('color', e.target.value)}
                      className="w-10 h-10 rounded cursor-pointer border-0" />
                    <span className="text-sm code-inline text-gray-400">{formData.color}</span>
                  </div>
                  <div>
                    <label className="text-sm font-medium text-gray-600">범위 (range): {formData.range}</label>
                    <input type="range" min="0" max="100" value={formData.range}
                      onChange={e => handleChange('range', e.target.value)}
                      className="w-full accent-blue-500 mt-1" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-600 mb-1">자기소개 (textarea)</label>
                    <textarea rows="3" placeholder="자기소개를 입력하세요..."
                      className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-300 outline-none transition resize-y" />
                  </div>
                </div>
              </fieldset>

              <div className="flex gap-2">
                <button type="submit" className="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600 transition font-medium">제출</button>
                <button type="reset" className="bg-gray-100 text-gray-600 px-5 py-2 rounded-lg hover:bg-gray-200 transition border border-gray-200">초기화</button>
                <button type="button" className="bg-white text-gray-500 px-5 py-2 rounded-lg hover:bg-gray-50 transition border border-gray-200">일반 버튼</button>
              </div>
            </form>
          </div>
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 미디어 태그
    // ========================================

    function MediaSection() {
      return (
        <SectionCard title="🖼️ 미디어 태그" color="blue">
          <div className="bg-white rounded-lg p-4 space-y-4">
            <div>
              <h3 className="font-semibold text-gray-600 mb-2">이미지 (img)</h3>
              <img src="https://picsum.photos/400/200" alt="예시 이미지" className="rounded-lg shadow-sm" loading="lazy" />
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">figure & figcaption</h3>
              <figure className="text-center">
                <img src="https://picsum.photos/300/180?random=2" alt="figure 예시" className="rounded-lg shadow-sm mx-auto" loading="lazy" />
                <figcaption className="text-sm text-gray-400 mt-2 italic">그림 1: figure와 figcaption 태그 예시</figcaption>
              </figure>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">SVG (인라인)</h3>
              <svg width="200" height="80" xmlns="http://www.w3.org/2000/svg" className="rounded-lg">
                <rect x="5" y="5" width="70" height="70" rx="10" fill="#4285f4" />
                <circle cx="140" cy="40" r="35" fill="#ea4335" />
                <text x="100" y="75" textAnchor="middle" fill="#666" fontSize="11">SVG 예시</text>
              </svg>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">오디오 & 비디오</h3>
              <p className="text-sm text-gray-400">
                <Tag name="audio" /> — <code className="code-inline text-xs bg-gray-100 px-1 rounded">controls, preload, autoplay, loop, muted</code><br />
                <Tag name="video" /> — <code className="code-inline text-xs bg-gray-100 px-1 rounded">controls, width, height, poster, preload</code>
              </p>
            </div>
          </div>
          <CodeBlock code={`<img src="image.jpg" alt="설명" loading="lazy" />\n\n<figure>\n  <img src="photo.jpg" alt="사진" />\n  <figcaption>사진 설명</figcaption>\n</figure>\n\n<audio controls>\n  <source src="audio.mp3" type="audio/mpeg" />\n</audio>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 시맨틱 태그
    // ========================================

    function SemanticSection() {
      const [detailsOpen, setDetailsOpen] = useState(false);

      return (
        <SectionCard title="🏗️ 시맨틱 & 구조 태그" color="purple">
          <div className="bg-white rounded-lg p-4 space-y-4">

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-gray-50 border border-gray-200 rounded-lg p-4">
                <div className="text-xs text-blue-400 font-bold mb-1">&lt;article&gt;</div>
                <h4 className="font-semibold">블로그 글 예시</h4>
                <p className="text-sm text-gray-500 mt-1">독립적인 콘텐츠 단위. 블로그, 뉴스 기사 등에 사용합니다.</p>
                <div className="text-xs text-gray-400 mt-2 pt-2 border-t border-gray-200">태그: HTML, 시맨틱</div>
              </div>

              <div className="bg-yellow-50 border-l-4 border-yellow-400 rounded-r-lg p-4">
                <div className="text-xs text-yellow-600 font-bold mb-1">&lt;aside&gt;</div>
                <p className="text-sm text-gray-600">본문과 간접적으로 관련된 부가 정보. 사이드바, 관련 링크 등에 사용합니다.</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
              <div className="bg-blue-50 rounded-lg p-3 text-center">
                <span className="font-bold text-blue-500">&lt;header&gt;</span>
                <p className="text-gray-500 text-xs mt-1">페이지/섹션 머리말</p>
              </div>
              <div className="bg-green-50 rounded-lg p-3 text-center">
                <span className="font-bold text-green-500">&lt;main&gt;</span>
                <p className="text-gray-500 text-xs mt-1">주요 콘텐츠 영역</p>
              </div>
              <div className="bg-purple-50 rounded-lg p-3 text-center">
                <span className="font-bold text-purple-500">&lt;footer&gt;</span>
                <p className="text-gray-500 text-xs mt-1">페이지/섹션 꼬리말</p>
              </div>
              <div className="bg-orange-50 rounded-lg p-3 text-center">
                <span className="font-bold text-orange-500">&lt;nav&gt;</span>
                <p className="text-gray-500 text-xs mt-1">내비게이션 링크</p>
              </div>
              <div className="bg-pink-50 rounded-lg p-3 text-center">
                <span className="font-bold text-pink-500">&lt;section&gt;</span>
                <p className="text-gray-500 text-xs mt-1">주제별 그룹</p>
              </div>
              <div className="bg-teal-50 rounded-lg p-3 text-center">
                <span className="font-bold text-teal-500">&lt;figure&gt;</span>
                <p className="text-gray-500 text-xs mt-1">독립 콘텐츠 + 캡션</p>
              </div>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">details & summary</h3>
              <div className="border border-gray-200 rounded-lg overflow-hidden">
                <button onClick={() => setDetailsOpen(!detailsOpen)}
                  className="w-full text-left px-4 py-3 bg-gray-50 hover:bg-gray-100 transition font-medium text-sm flex justify-between items-center">
                  <span>클릭하여 펼치기 (details + summary)</span>
                  <span className={`transition-transform ${detailsOpen ? 'rotate-180' : ''}`}>▼</span>
                </button>
                {detailsOpen && (
                  <div className="px-4 py-3 text-sm text-gray-600">
                    접을 수 있는 콘텐츠입니다. details 태그 안에 숨겨진 내용이 들어갑니다.
                  </div>
                )}
              </div>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">div & span</h3>
              <div className="border border-dashed border-gray-300 rounded-lg p-3 bg-gray-50">
                <p className="text-sm text-gray-500">
                  <Tag name="div" /> — 의미 없는 블록 컨테이너 (스타일링/레이아웃용)<br />
                  이것은 <span className="text-red-500 font-medium">&lt;span&gt; 태그</span>입니다 — 인라인 컨테이너
                </p>
              </div>
            </div>

          </div>
          <CodeBlock code={`<header>머리말</header>\n<nav>내비게이션</nav>\n<main>\n  <article>독립 콘텐츠</article>\n  <aside>부가 정보</aside>\n</main>\n<footer>꼬리말</footer>\n\n<details>\n  <summary>펼치기</summary>\n  <p>숨겨진 내용</p>\n</details>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: 링크 태그
    // ========================================

    function LinkSection() {
      return (
        <SectionCard title="🔗 링크 태그 (a)" color="teal">
          <div className="bg-white rounded-lg p-4 space-y-2 text-sm">
            <p><a href="https://www.example.com" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">외부 링크 (새 탭) →</a></p>
            <p><a href="#top" className="text-blue-500 hover:underline">페이지 내 이동 (앵커 #)</a></p>
            <p><a href="mailto:test@example.com" className="text-blue-500 hover:underline">이메일 보내기 (mailto:)</a></p>
            <p><a href="tel:010-1234-5678" className="text-blue-500 hover:underline">전화 걸기 (tel:)</a></p>
          </div>
          <CodeBlock code={`<a href="https://example.com" target="_blank">외부 링크</a>\n<a href="#section">앵커 링크</a>\n<a href="mailto:hi@example.com">이메일</a>\n<a href="tel:010-1234-5678">전화</a>`} />
        </SectionCard>
      );
    }

    // ========================================
    // 📄 Section: CSS 스타일 속성 정리
    // ========================================

    function CSSSection() {
      return (
        <SectionCard title="🎨 CSS 주요 스타일 속성" color="orange">
          <div className="bg-white rounded-lg p-4 space-y-5">

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">박스 모델 (Box Model)</h3>
              <div className="flex justify-center">
                <div className="bg-orange-100 p-4 rounded-lg text-center text-xs">
                  <span className="text-orange-400">margin</span>
                  <div className="bg-yellow-100 p-4 rounded mt-1">
                    <span className="text-yellow-600">border</span>
                    <div className="bg-green-100 p-4 rounded mt-1">
                      <span className="text-green-600">padding</span>
                      <div className="bg-blue-200 p-4 rounded mt-1 font-bold text-blue-700">content</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">display 속성</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">
                {['block', 'inline', 'inline-block', 'flex', 'grid', 'none', 'inline-flex', 'table'].map(d => (
                  <div key={d} className="bg-gray-100 rounded px-3 py-2 text-center code-inline text-gray-600">{d}</div>
                ))}
              </div>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">position 속성</h3>
              <div className="flex flex-wrap gap-2 text-sm">
                {[
                  { name: 'static', desc: '기본값' },
                  { name: 'relative', desc: '자기 기준 이동' },
                  { name: 'absolute', desc: '부모 기준 배치' },
                  { name: 'fixed', desc: '화면 고정' },
                  { name: 'sticky', desc: '스크롤 고정' },
                ].map(p => (
                  <div key={p.name} className="bg-purple-50 border border-purple-200 rounded-lg px-3 py-2">
                    <span className="code-inline text-purple-600 font-medium">{p.name}</span>
                    <span className="text-gray-400 text-xs ml-1">— {p.desc}</span>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">Flexbox 예시</h3>
              <div className="flex gap-2 bg-gray-100 p-3 rounded-lg">
                {[1, 2, 3].map(n => (
                  <div key={n} className="bg-blue-400 text-white rounded px-4 py-2 text-sm font-medium">item {n}</div>
                ))}
              </div>
              <CodeBlock code={`display: flex;\ngap: 8px;\njustify-content: center;\nalign-items: center;`} />
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">Grid 예시</h3>
              <div className="grid grid-cols-3 gap-2 bg-gray-100 p-3 rounded-lg">
                {[1, 2, 3, 4, 5, 6].map(n => (
                  <div key={n} className="bg-green-400 text-white rounded px-3 py-2 text-sm text-center font-medium">{n}</div>
                ))}
              </div>
              <CodeBlock code={`display: grid;\ngrid-template-columns: repeat(3, 1fr);\ngap: 8px;`} />
            </div>

            <div>
              <h3 className="font-semibold text-gray-600 mb-2">자주 쓰는 속성들</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm border-collapse">
                  <thead>
                    <tr className="bg-gray-100">
                      <th className="text-left px-3 py-2 font-semibold">속성</th>
                      <th className="text-left px-3 py-2 font-semibold">설명</th>
                      <th className="text-left px-3 py-2 font-semibold">예시</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {[
                      ['color', '글자 색상', 'color: #333;'],
                      ['background', '배경', 'background: #f5f5f5;'],
                      ['font-size', '글자 크기', 'font-size: 16px;'],
                      ['font-weight', '글자 굵기', 'font-weight: bold;'],
                      ['border', '테두리', 'border: 1px solid #ccc;'],
                      ['border-radius', '모서리 둥글기', 'border-radius: 8px;'],
                      ['box-shadow', '그림자', 'box-shadow: 0 2px 8px rgba(0,0,0,0.1);'],
                      ['opacity', '투명도', 'opacity: 0.5;'],
                      ['transition', '전환 효과', 'transition: all 0.3s ease;'],
                      ['transform', '변형', 'transform: scale(1.1);'],
                      ['overflow', '넘침 처리', 'overflow: hidden;'],
                      ['z-index', '겹침 순서', 'z-index: 10;'],
                    ].map(([prop, desc, example]) => (
                      <tr key={prop} className="hover:bg-gray-50">
                        <td className="px-3 py-2 code-inline text-pink-500">{prop}</td>
                        <td className="px-3 py-2 text-gray-600">{desc}</td>
                        <td className="px-3 py-2 code-inline text-gray-400 text-xs">{example}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </SectionCard>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          <header className="text-center mb-10">
            <h1 className="text-3xl font-bold text-gray-800 mb-2">HTML 태그 & CSS 스타일 정리</h1>
            <p className="text-gray-400">주요 HTML 태그와 CSS 속성을 한 페이지에서 확인하세요</p>
          </header>

          <nav className="flex flex-wrap justify-center gap-2 mb-8">
            {['제목', '텍스트', '인용문', '목록', '표', '폼', '미디어', '시맨틱', '링크', 'CSS'].map(item => (
              <span key={item} className="bg-gray-200 hover:bg-gray-800 hover:text-white text-gray-600 text-sm px-3 py-1 rounded-full cursor-default transition">
                {item}
              </span>
            ))}
          </nav>

          <HeadingSection />
          <TextSection />
          <QuoteSection />
          <ListSection />
          <TableSection />
          <FormSection />
          <MediaSection />
          <SemanticSection />
          <LinkSection />
          <CSSSection />

          <footer className="text-center text-sm text-gray-400 mt-10 pb-8">
            <p>&copy; 2026 HTML & CSS 정리 페이지</p>
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            fadeUp: {
              from: { opacity: '0', transform: 'translateY(16px)' },
              to: { opacity: '1', transform: 'translateY(0)' },
            },
            popIn: {
              '0%': { opacity: '0', transform: 'scale(0.85)' },
              '60%': { transform: 'scale(1.03)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            slideIn: {
              from: { opacity: '0', transform: 'translateX(-10px)' },
              to: { opacity: '1', transform: 'translateX(0)' },
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.4s ease-out both',
            'pop-in': 'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both',
            'slide-in': 'slideIn 0.3s ease-out both',
          },
        },
      },
    };
  </script>
  <style>
    .gradient-text {
      background: linear-gradient(135deg, #6366f1, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useCallback, useMemo } = React;

    // ========================================
    // Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled = false, className = '', ariaLabel }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            disabled={disabled}
            aria-label={ariaLabel || label}
            className={`w-full px-4 py-3 border-2 rounded-xl text-base transition-all
              focus:outline-none focus:ring-4
              ${error
                ? 'border-red-300 focus:border-red-400 focus:ring-red-50'
                : 'border-gray-200 focus:border-indigo-400 focus:ring-indigo-50'
              }
              ${disabled ? 'bg-gray-50 text-gray-400 cursor-not-allowed' : 'bg-white'}
            `}
          />
          {error && <p className="text-xs text-red-500 mt-1">{error}</p>}
        </div>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">{label}</label>}
          <select
            value={value}
            onChange={e => onChange(e.target.value)}
            className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-base bg-white
                       focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 focus:outline-none
                       transition-all appearance-none cursor-pointer"
          >
            {options.map(opt => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        </div>
      );
    }

    function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
      const base = 'font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 active:scale-[0.97]';
      const sizes = { sm: 'px-4 py-2 text-sm', md: 'px-5 py-3 text-base', lg: 'px-6 py-3.5 text-lg' };
      const variants = {
        primary: 'bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white shadow-md shadow-indigo-200 focus:ring-indigo-400 disabled:from-gray-300 disabled:to-gray-300 disabled:shadow-none disabled:cursor-not-allowed',
        secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-600 focus:ring-gray-300',
        danger: 'bg-red-50 hover:bg-red-100 text-red-500 focus:ring-red-300',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-500 focus:ring-gray-200',
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    function Badge({ children, color = 'gray' }) {
      const colors = {
        blue: 'bg-indigo-100 text-indigo-600',
        green: 'bg-emerald-100 text-emerald-600',
        amber: 'bg-amber-100 text-amber-700',
        red: 'bg-red-100 text-red-600',
        gray: 'bg-gray-100 text-gray-500',
        pink: 'bg-pink-100 text-pink-600',
      };
      return (
        <span className={`inline-block text-xs font-bold px-2.5 py-0.5 rounded-full ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
          <div
            className="relative bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl w-full sm:max-w-lg p-6 animate-fade-up max-h-[85vh] overflow-y-auto"
            onClick={e => e.stopPropagation()}
          >
            <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4 sm:hidden" />
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-lg font-bold text-gray-800">{title}</h2>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-400 hover:text-gray-600 transition-colors" aria-label="닫기">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // Calculation Logic (배열, 반복문, 조건 분기)
    // ========================================
    function calculateDutchPay(members, discountType, discountValue) {
      // 1. 각 멤버별 주문 금액 합산 (배열 + 반복문)
      const memberTotals = members.map(member => {
        let total = 0;
        for (let i = 0; i < member.orders.length; i++) {
          total += member.orders[i].price * member.orders[i].qty;
        }
        return { ...member, subtotal: total };
      });

      // 2. 전체 합계
      const grandTotal = memberTotals.reduce((sum, m) => sum + m.subtotal, 0);

      // 3. 할인 금액 계산 (조건 분기)
      let discountAmount = 0;
      if (discountType === 'percent') {
        discountAmount = Math.floor(grandTotal * (discountValue / 100));
      } else if (discountType === 'fixed') {
        discountAmount = Math.min(discountValue, grandTotal);
      }
      // discountType === 'none' 이면 0

      const afterDiscount = grandTotal - discountAmount;

      // 4. 할인 비율로 각자 부담액 계산 (반복문 + 조건 분기)
      const results = [];
      let assignedTotal = 0;

      for (let i = 0; i < memberTotals.length; i++) {
        const m = memberTotals[i];
        let finalAmount;

        if (grandTotal === 0) {
          finalAmount = 0;
        } else if (i === memberTotals.length - 1) {
          // 마지막 사람은 나머지 금액 (반올림 오차 보정)
          finalAmount = afterDiscount - assignedTotal;
        } else {
          // 비율 기반 배분
          finalAmount = Math.round((m.subtotal / grandTotal) * afterDiscount);
        }

        assignedTotal += finalAmount;

        results.push({
          name: m.name,
          subtotal: m.subtotal,
          discountShare: m.subtotal - finalAmount,
          finalAmount,
          orders: m.orders,
        });
      }

      return { results, grandTotal, discountAmount, afterDiscount };
    }

    // ========================================
    // Page Components
    // ========================================
    function MemberCard({ member, index, onUpdate, onRemove, canRemove }) {
      const addOrder = useCallback(() => {
        const newOrders = [...member.orders, { menu: '', price: 0, qty: 1 }];
        onUpdate(index, { ...member, orders: newOrders });
      }, [member, index, onUpdate]);

      const updateOrder = useCallback((orderIdx, field, value) => {
        const newOrders = member.orders.map((o, i) => {
          if (i !== orderIdx) return o;
          if (field === 'price' || field === 'qty') {
            return { ...o, [field]: Math.max(0, parseInt(value) || 0) };
          }
          return { ...o, [field]: value };
        });
        onUpdate(index, { ...member, orders: newOrders });
      }, [member, index, onUpdate]);

      const removeOrder = useCallback((orderIdx) => {
        const newOrders = member.orders.filter((_, i) => i !== orderIdx);
        onUpdate(index, { ...member, orders: newOrders.length ? newOrders : [{ menu: '', price: 0, qty: 1 }] });
      }, [member, index, onUpdate]);

      const memberTotal = member.orders.reduce((sum, o) => sum + o.price * o.qty, 0);

      return (
        <div className="border-2 border-gray-100 rounded-2xl p-4 sm:p-5 animate-fade-up hover:border-indigo-100 transition-colors">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-violet-400 flex items-center justify-center text-white font-bold text-sm shadow-sm">
                {index + 1}
              </div>
              <input
                type="text"
                value={member.name}
                onChange={e => onUpdate(index, { ...member, name: e.target.value })}
                placeholder={`참가자 ${index + 1}`}
                className="text-lg font-bold text-gray-800 border-none outline-none bg-transparent placeholder-gray-300 w-32 sm:w-auto"
                aria-label={`참가자 ${index + 1} 이름`}
              />
            </div>
            <div className="flex items-center gap-2">
              <Badge color={memberTotal > 0 ? 'blue' : 'gray'}>
                {memberTotal.toLocaleString()}원
              </Badge>
              {canRemove && (
                <button
                  onClick={() => onRemove(index)}
                  className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-red-50 text-gray-300 hover:text-red-400 transition-colors"
                  aria-label="참가자 삭제"
                >
                  <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
                </button>
              )}
            </div>
          </div>

          {/* 주문 목록 */}
          <div className="space-y-2">
            {member.orders.map((order, oIdx) => (
              <div key={oIdx} className="flex gap-2 items-center animate-slide-in" style={{ animationDelay: `${oIdx * 30}ms` }}>
                <input
                  type="text"
                  value={order.menu}
                  onChange={e => updateOrder(oIdx, 'menu', e.target.value)}
                  placeholder="메뉴명"
                  className="flex-1 min-w-0 px-3 py-2.5 border-2 border-gray-100 rounded-xl text-sm
                             focus:border-indigo-300 focus:ring-2 focus:ring-indigo-50 focus:outline-none transition-all"
                  aria-label={`${member.name} 메뉴 ${oIdx + 1}`}
                />
                <input
                  type="number"
                  value={order.price || ''}
                  onChange={e => updateOrder(oIdx, 'price', e.target.value)}
                  placeholder="가격"
                  className="w-24 sm:w-28 px-3 py-2.5 border-2 border-gray-100 rounded-xl text-sm text-right
                             focus:border-indigo-300 focus:ring-2 focus:ring-indigo-50 focus:outline-none transition-all"
                  aria-label={`${member.name} 메뉴 ${oIdx + 1} 가격`}
                />
                <select
                  value={order.qty}
                  onChange={e => updateOrder(oIdx, 'qty', e.target.value)}
                  className="w-16 px-2 py-2.5 border-2 border-gray-100 rounded-xl text-sm text-center
                             focus:border-indigo-300 focus:outline-none transition-all bg-white"
                  aria-label={`${member.name} 메뉴 ${oIdx + 1} 수량`}
                >
                  {Array.from({ length: 10 }, (_, i) => (
                    <option key={i + 1} value={i + 1}>{i + 1}개</option>
                  ))}
                </select>
                {member.orders.length > 1 && (
                  <button
                    onClick={() => removeOrder(oIdx)}
                    className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-red-50 text-gray-300 hover:text-red-400 transition-colors"
                    aria-label="메뉴 삭제"
                  >
                    <svg width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
                  </button>
                )}
              </div>
            ))}
          </div>

          <button
            onClick={addOrder}
            className="mt-3 w-full py-2 text-sm font-medium text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors"
          >
            + 메뉴 추가
          </button>
        </div>
      );
    }

    function ResultModal({ isOpen, onClose, result }) {
      if (!result) return null;
      const { results, grandTotal, discountAmount, afterDiscount } = result;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="정산 결과">
          {/* 총 요약 */}
          <div className="bg-gradient-to-br from-indigo-50 to-violet-50 rounded-2xl p-5 mb-5">
            <div className="grid grid-cols-3 gap-3 text-center">
              <div>
                <p className="text-xs text-gray-400 mb-1">총 금액</p>
                <p className="text-lg font-bold text-gray-800">{grandTotal.toLocaleString()}원</p>
              </div>
              <div>
                <p className="text-xs text-gray-400 mb-1">할인</p>
                <p className="text-lg font-bold text-red-500">-{discountAmount.toLocaleString()}원</p>
              </div>
              <div>
                <p className="text-xs text-gray-400 mb-1">결제 금액</p>
                <p className="text-lg font-bold text-indigo-600">{afterDiscount.toLocaleString()}원</p>
              </div>
            </div>
          </div>

          {/* 개인별 결과 */}
          <div className="space-y-3 mb-6">
            {results.map((r, i) => (
              <div key={i} className="border border-gray-100 rounded-xl p-4 animate-slide-in" style={{ animationDelay: `${i * 60}ms` }}>
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-violet-400 flex items-center justify-center text-white font-bold text-xs">
                      {i + 1}
                    </div>
                    <span className="font-bold text-gray-800">{r.name || `참가자 ${i + 1}`}</span>
                  </div>
                  <span className="text-xl font-extrabold text-indigo-600">{r.finalAmount.toLocaleString()}원</span>
                </div>
                {/* 주문 내역 */}
                <div className="ml-10 space-y-0.5">
                  {r.orders.filter(o => o.menu || o.price > 0).map((o, j) => (
                    <div key={j} className="flex justify-between text-xs text-gray-400">
                      <span>{o.menu || '(메뉴명 없음)'} x{o.qty}</span>
                      <span>{(o.price * o.qty).toLocaleString()}원</span>
                    </div>
                  ))}
                </div>
                {r.discountShare > 0 && (
                  <div className="ml-10 mt-1 flex justify-between text-xs text-red-400">
                    <span>할인 적용</span>
                    <span>-{r.discountShare.toLocaleString()}원</span>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* 복사 버튼 */}
          <Button
            onClick={() => {
              const text = results.map(r =>
                `${r.name || '참가자'}: ${r.finalAmount.toLocaleString()}원`
              ).join('\n') + `\n\n총 ${afterDiscount.toLocaleString()}원 (할인 ${discountAmount.toLocaleString()}원)`;
              navigator.clipboard.writeText(text);
            }}
            variant="secondary"
            className="w-full"
          >
            결과 복사하기
          </Button>
        </Modal>
      );
    }

    function DutchPayCalculator() {
      const [members, setMembers] = useState([
        { name: '', orders: [{ menu: '', price: 0, qty: 1 }] },
        { name: '', orders: [{ menu: '', price: 0, qty: 1 }] },
      ]);
      const [discountType, setDiscountType] = useState('none');
      const [discountValue, setDiscountValue] = useState('');
      const [showResult, setShowResult] = useState(false);
      const [result, setResult] = useState(null);

      const addMember = useCallback(() => {
        setMembers(prev => [...prev, { name: '', orders: [{ menu: '', price: 0, qty: 1 }] }]);
      }, []);

      const removeMember = useCallback((idx) => {
        setMembers(prev => prev.filter((_, i) => i !== idx));
      }, []);

      const updateMember = useCallback((idx, updated) => {
        setMembers(prev => prev.map((m, i) => i === idx ? updated : m));
      }, []);

      const grandTotal = useMemo(() => {
        return members.reduce((sum, m) =>
          sum + m.orders.reduce((s, o) => s + o.price * o.qty, 0)
        , 0);
      }, [members]);

      const handleCalculate = useCallback(() => {
        const discVal = parseInt(discountValue) || 0;
        const calcResult = calculateDutchPay(members, discountType, discVal);
        setResult(calcResult);
        setShowResult(true);
      }, [members, discountType, discountValue]);

      const handleReset = useCallback(() => {
        setMembers([
          { name: '', orders: [{ menu: '', price: 0, qty: 1 }] },
          { name: '', orders: [{ menu: '', price: 0, qty: 1 }] },
        ]);
        setDiscountType('none');
        setDiscountValue('');
        setResult(null);
      }, []);

      const hasAnyOrder = members.some(m => m.orders.some(o => o.price > 0));

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-slate-50 to-amber-50 p-4 sm:p-6">
          <div className="max-w-xl mx-auto">
            {/* 헤더 */}
            <div className="text-center pt-4 sm:pt-8 mb-6">
              <h1 className="text-3xl sm:text-4xl font-extrabold">
                <span className="gradient-text">더치페이</span>
                <span className="text-gray-800"> 계산기</span>
              </h1>
              <p className="text-sm text-gray-400 mt-2">각자 먹은 메뉴 기준으로 공정하게 정산하세요</p>
            </div>

            {/* 인원 & 할인 설정 */}
            <Card className="p-5 sm:p-6 mb-4">
              <div className="flex items-center justify-between mb-1">
                <h2 className="text-base font-bold text-gray-700">참가자</h2>
                <div className="flex items-center gap-2">
                  <Badge color="blue">{members.length}명</Badge>
                  <Button onClick={addMember} variant="ghost" size="sm">+ 추가</Button>
                </div>
              </div>
              <p className="text-xs text-gray-400 mb-4">이름을 입력하고 각자 먹은 메뉴를 추가하세요</p>

              <div className="space-y-4">
                {members.map((member, idx) => (
                  <MemberCard
                    key={idx}
                    member={member}
                    index={idx}
                    onUpdate={updateMember}
                    onRemove={removeMember}
                    canRemove={members.length > 2}
                  />
                ))}
              </div>
            </Card>

            {/* 할인 설정 */}
            <Card className="p-5 sm:p-6 mb-4">
              <h2 className="text-base font-bold text-gray-700 mb-4">할인 적용</h2>
              <div className="flex gap-3">
                <Select
                  label="할인 유형"
                  value={discountType}
                  onChange={setDiscountType}
                  options={[
                    { value: 'none', label: '할인 없음' },
                    { value: 'percent', label: '퍼센트 (%)' },
                    { value: 'fixed', label: '정액 (원)' },
                  ]}
                  className="flex-1"
                />
                {discountType !== 'none' && (
                  <Input
                    label={discountType === 'percent' ? '할인율' : '할인 금액'}
                    type="number"
                    value={discountValue}
                    onChange={setDiscountValue}
                    placeholder={discountType === 'percent' ? '10' : '5000'}
                    className="flex-1 animate-fade-up"
                  />
                )}
              </div>
              {discountType === 'percent' && discountValue && (
                <p className="text-xs text-amber-600 mt-2 animate-fade-up">
                  할인 예상: -{Math.floor(grandTotal * (parseInt(discountValue) || 0) / 100).toLocaleString()}원
                </p>
              )}
              {discountType === 'fixed' && discountValue && (
                <p className="text-xs text-amber-600 mt-2 animate-fade-up">
                  할인: -{Math.min(parseInt(discountValue) || 0, grandTotal).toLocaleString()}원
                </p>
              )}
            </Card>

            {/* 총액 & 계산 버튼 */}
            <Card className="p-5 sm:p-6 mb-6">
              <div className="flex items-center justify-between mb-4">
                <span className="text-sm text-gray-500">총 주문 금액</span>
                <span className="text-2xl font-extrabold text-gray-800">{grandTotal.toLocaleString()}원</span>
              </div>
              <div className="flex gap-3">
                <Button onClick={handleReset} variant="secondary" className="flex-shrink-0">초기화</Button>
                <Button onClick={handleCalculate} disabled={!hasAnyOrder} className="flex-1" size="lg">
                  정산하기
                </Button>
              </div>
            </Card>

            <p className="text-center text-gray-300 text-xs mb-4">
              각자 먹은 만큼 · 할인도 비율로 공정 배분
            </p>
          </div>

          {/* 결과 모달 */}
          <ResultModal isOpen={showResult} onClose={() => setShowResult(false)} result={result} />
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      return <DutchPayCalculator />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

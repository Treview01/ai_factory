<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 800px; height: 600px; overflow: hidden; }
  .container {
    width: 800px; height: 600px;
    position: relative;
    background-size: cover;
    background-position: center;
    background-color: #2c1810;
  }
  .overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 60px 30px 30px;
    color: white;
  }
  .title {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 38px; font-weight: 800;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .info {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 18px; opacity: 0.9;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute; top: 20px; left: 20px;
    background: #e74c3c; color: white;
    padding: 8px 18px; border-radius: 20px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .sub-badge {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.2); color: white;
    padding: 8px 16px; border-radius: 20px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 600;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
  <div class="container" style="background-image: url('https://images.unsplash.com/photo-1590301157890-4810ed352733?w=800&h=600&fit=crop&q=80');">
    <div class="badge">집밥 레시피</div>
    <div class="sub-badge">앞다리살 활용</div>
    <div class="overlay">
      <div class="title">매콤 달콤 제육볶음</div>
      <div class="info">25분 완성 | 2인분 | 난이도 ★ 쉬움</div>
    </div>
  </div>
</body>
</html>
